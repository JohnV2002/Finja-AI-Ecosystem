<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Finja Commands</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Nunito", sans-serif;
    }

    #box {
      display: inline-block;
      padding: 20px 26px;
      border-radius: 16px;
      background: rgba(10,16,28,0.65);
      border-left: 4px solid #7aa2ff; /* Finja Blue Accent 💙 */
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      color: #eaf6ff;
      font-size: 18px;
      line-height: 1.6;
      backdrop-filter: blur(6px);
      max-width: 420px;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 22px;
      color: #7aa2ff;
      font-weight: 700;
    }

    .section {
      margin: 16px 0 8px 0;
      padding-top: 8px;
      border-top: 1px dashed rgba(255,255,255,0.12);
    }

    .section-title {
      font-size: 16px;
      opacity: 0.85;
      margin: 0 0 8px 0;
      color: #a0b4ff;
    }

    .cmd {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 4px 0;
    }

    .emoji {
      font-size: 20px;
      width: 26px;
      text-align: center;
    }

    .text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Responsive */
    @media (max-width: 480px) {
      #box { font-size: 16px; padding: 16px 20px; }
      .emoji { font-size: 18px; width: 24px; }
    }
  </style>
</head>
<body>
  <div id="box">
    <h2>Chat — Commands 💙</h2>

    <div class="section">
      <div class="section-title">💬 for everyone</div>
     <!-- <div class="cmd"><span class="emoji">🤖</span><span class="text">!ask     → Frage Lexi etwas!</span></div> -->
      <div class="cmd"><span class="emoji">⏱️</span><span class="text">!uptime  → Shows Stream time</span></div>
      <div class="cmd"><span class="emoji">🥤</span><span class="text">!soda    → POGGERS® Sponsor Link</span></div>
    <!--  <div class="cmd"><span class="emoji">🧭</span><span class="text">!help    → Show all commands</span></div> -->
    </div>

      <div class="cmd"><span class="emoji">🎵</span><span class="text">!sr      → Song wish (Spotify)</span></div>
    </div>
