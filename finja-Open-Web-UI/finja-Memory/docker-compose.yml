services:
  # Main service for the memory server
  finja-memory-server:
    # Build Docker image from Dockerfile in current directory
    build: .
    # Fixed, recognizable container name
    container_name: finja-memory-server
    # Load configuration (API key) from .env file
    # Safer than copying the file into the image
    env_file:
      - .env
    # Mount data folders to host for persistence across container rebuilds
    volumes:
      - ./user_audio:/app/user_audio
      - ./tts_cache:/app/tts_cache
      - ./user_memories:/app/user_memories
      - ./backups:/app/backups
    # Forward host port 8000 to container port 8000
    ports:
      - "8000:8000"
    # Run as host user to avoid permission issues on Linux
    user: "${UID:-1000}:${GID:-1000}"
    # Auto-restart unless manually stopped
    restart: unless-stopped
