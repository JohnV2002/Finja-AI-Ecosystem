services:
  finja-canvas:
    build: .
    ports:
      - "7676:8000"
    env_file:
      - .env
    environment:
      - PAINT_INTERVAL_SECONDS=20
    volumes:
      - ./data/canvas.csv:/app/canvas.csv
      - ./data/color.csv:/app/color.csv
      - ./data/gallery:/app/gallery
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
