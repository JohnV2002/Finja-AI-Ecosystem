name: Memory Unit Tests

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'finja-Open-Web-UI/finja-Memory/**'
      - '.github/workflows/memory-tests.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'finja-Open-Web-UI/finja-Memory/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        working-directory: ./finja-Open-Web-UI/finja-Memory
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiohttp numpy scikit-learn rapidfuzz
          
      - name: Run Pytest Suite
        working-directory: ./finja-Open-Web-UI/finja-Memory
        run: |
          pytest test_memory_server.py test_adaptive_memory.py -v
