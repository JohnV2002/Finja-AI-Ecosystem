name: Finja Instagram Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'finja-instagram/**'
      - '.github/workflows/finja-instagram-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'finja-instagram/**'
      - '.github/workflows/finja-instagram-tests.yml'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned to match the Dockerfile's python:3.11-slim base image.
        python-version: ["3.11"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-instagram-${{ hashFiles('finja-instagram/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-instagram-

      - name: Install dependencies
        working-directory: ./finja-instagram
        run: |
          python -m pip install --upgrade pip
          # Test tools (pyyaml is needed by test_docker_config.py)
          pip install pytest pytest-cov pytest-mock pyyaml
          # App dependencies -- only the Playwright *package* is needed
          # since Chrome/CDP is fully mocked in the tests, no browser
          # binaries are downloaded here.
          pip install -r requirements.txt

      - name: Run API tests
        working-directory: ./finja-instagram
        run: |
          pytest test_instagram_api.py -v --tb=short

      - name: Run autopilot tests
        working-directory: ./finja-instagram
        run: |
          pytest test_autopilot.py -v --tb=short

      - name: Run Docker config tests
        working-directory: ./finja-instagram
        run: |
          pytest test_docker_config.py -v --tb=short

      - name: Generate coverage report
        working-directory: ./finja-instagram
        run: |
          pytest test_*.py --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-finja-instagram-${{ matrix.python-version }}
          path: finja-instagram/coverage.xml
