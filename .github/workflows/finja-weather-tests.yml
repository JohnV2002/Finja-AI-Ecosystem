name: Finja Weather Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'finja-weather/**'
      - '.github/workflows/finja-weather-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'finja-weather/**'
      - '.github/workflows/finja-weather-tests.yml'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned to match the Dockerfile's python:3.12-slim base image.
        python-version: ["3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-weather-${{ hashFiles('finja-weather/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-weather-

      - name: Install dependencies
        working-directory: ./finja-weather
        run: |
          python -m pip install --upgrade pip
          # httpx2: recent Starlette releases require this for TestClient
          # (fastapi.testclient raises RuntimeError without it -- httpx
          # alone is no longer enough).
          pip install pytest pytest-cov pytest-mock pyyaml httpx2
          pip install -r requirements.txt

      - name: Run API tests
        working-directory: ./finja-weather
        run: |
          pytest test_weather_api.py -v --tb=short

      - name: Run provider tests
        working-directory: ./finja-weather
        run: |
          pytest test_providers.py -v --tb=short

      - name: Run Docker config tests
        working-directory: ./finja-weather
        run: |
          pytest test_docker_config.py -v --tb=short

      - name: Generate coverage report
        working-directory: ./finja-weather
        run: |
          pytest test_weather_api.py test_providers.py test_docker_config.py --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-finja-weather-${{ matrix.python-version }}
          path: finja-weather/coverage.xml
