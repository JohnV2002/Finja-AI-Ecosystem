# .github/workflows/web-crawler-tests.yml
name: Web-Crawler Unit Tests

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'finja-Open-Web-UI/finja-web-crawler/**'
      - '.github/workflows/web-crawler-tests.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'finja-Open-Web-UI/finja-web-crawler/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        working-directory: ./finja-Open-Web-UI/finja-web-crawler
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          
      - name: Run Pytest Suite
        working-directory: ./finja-Open-Web-UI/finja-web-crawler
        run: |
          pytest test_web_crawler.py -v
