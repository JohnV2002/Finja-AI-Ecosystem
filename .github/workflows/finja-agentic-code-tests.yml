name: Finja Agentic Code Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'finja-agentic-code/**'
      - '.github/workflows/finja-agentic-code-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'finja-agentic-code/**'
      - '.github/workflows/finja-agentic-code-tests.yml'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned to match the orchestrator/worker Dockerfiles (python:3.11-slim).
        python-version: ["3.11"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-agentic-${{ hashFiles('finja-agentic-code/orchestrator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-agentic-

      - name: Install dependencies
        working-directory: ./finja-agentic-code
        run: |
          python -m pip install --upgrade pip
          # Test tools (httpx2: fastapi.testclient needs it on recent Starlette)
          pip install pytest pytest-cov pytest-mock httpx2
          # Orchestrator app dependencies (fastapi, pydantic, cryptography, ...)
          pip install -r orchestrator/requirements.txt

      - name: Run orchestrator tests
        working-directory: ./finja-agentic-code
        run: |
          pytest test_orchestrator.py -v --tb=short

      - name: Run worker tests
        working-directory: ./finja-agentic-code
        run: |
          pytest test_worker.py -v --tb=short

      - name: Generate coverage report
        working-directory: ./finja-agentic-code
        run: |
          pytest test_orchestrator.py test_worker.py --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-finja-agentic-code-${{ matrix.python-version }}
          path: finja-agentic-code/coverage.xml
