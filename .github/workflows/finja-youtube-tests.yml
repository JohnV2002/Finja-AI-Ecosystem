name: Finja YouTube Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'finja-youtube/**'
      - '.github/workflows/finja-youtube-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'finja-youtube/**'
      - '.github/workflows/finja-youtube-tests.yml'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned to match the Dockerfile's python:3.11-slim base image.
        python-version: ["3.11"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-youtube-${{ hashFiles('finja-youtube/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-youtube-

      - name: Install dependencies
        working-directory: ./finja-youtube
        run: |
          python -m pip install --upgrade pip
          # Test tools (pyyaml is needed by test_docker_config.py)
          pip install pytest pytest-cov pytest-mock pyyaml
          # App dependencies -- only the Playwright *package* is needed
          # since Chrome/CDP is fully mocked in the tests, no browser
          # binaries are downloaded here.
          pip install -r requirements.txt

      - name: Run API tests
        working-directory: ./finja-youtube
        run: |
          pytest test_youtube_api.py -v --tb=short

      - name: Run autopilot tests
        working-directory: ./finja-youtube
        run: |
          pytest test_autopilot.py -v --tb=short

      - name: Run Docker config tests
        working-directory: ./finja-youtube
        run: |
          pytest test_docker_config.py -v --tb=short

      - name: Generate coverage report
        working-directory: ./finja-youtube
        run: |
          pytest test_*.py --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-finja-youtube-${{ matrix.python-version }}
          path: finja-youtube/coverage.xml
