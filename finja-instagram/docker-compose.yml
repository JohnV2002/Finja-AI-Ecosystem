#
#   Stack: Gluetun (VPN) + finja-instagram (Chrome + API), Desktop mode
#   (no mobile emulation!) using ArrowDown Reel navigation.
#   All traffic from finja-instagram is routed through the VPN tunnel.
#   Kill Switch: if VPN drops → no internet → no IP leaks.
#
#   Service/volume names are deliberately suffixed (-instagram/-ig)
#   instead of the generic names finja-youtube uses, so both stacks can
#   run side by side on the same machine without colliding.
#
#   Setup:
#     1. Copy .env.example to .env and fill in your VPN credentials
#        (.env must stay in this directory -- Compose only auto-loads
#        it from here for ${VAR} substitution, not from private/)
#     2. Provide cookie file(s) in private/ (never synced/committed):
#        - private/www.instagram.com_cookies.json (preferred)
#        - private/www.instagram.com_cookies.txt (Netscape fallback)
#     3. docker compose up -d --build
#     4. docker compose logs -f
#     5. Health: curl http://localhost:8061/health
#
#   New in v1.1.0:
#     • Merged Production + GitHub tracks (2026-07-19): added the
#       INSTAGRAM_TARGET_URL/FINJA_BRAIN_URL/DISCORD_WEBHOOK_URL
#       passthroughs from GitHub
#     • Cookie mounts moved to ./private/ (was project root) -- private/
#       is never synced/committed
#     • Kept Production's disambiguated service/volume names
#       (gluetun-instagram, chrome-profile-ig, gluetun-ig-data,
#       VPN_COUNTRY_IG) rather than GitHub's generic ones -- these exist
#       specifically so this stack never collides with finja-youtube's
#
# ======================================================================

services:
  # ---- VPN Gateway (ProtonVPN via Gluetun) ----
  gluetun-instagram:
    image: qmcgaw/gluetun
    container_name: finja-vpn-instagram
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    # Ports defined here because finja-instagram has no own network —
    # all traffic goes through gluetun, so ports must be mapped here.
    ports:
      - "8061:8061"   # Instagram API (for dev/test, remove in production)

    volumes:
      - gluetun-ig-data:/gluetun

    environment:
      # ---- ProtonVPN Config ----
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      # Credentials from .env (NEVER hardcode here!)
      - OPENVPN_USER=${PROTON_USER}
      - OPENVPN_PASSWORD=${PROTON_PASS}
      # Server selection -- deliberately a DIFFERENT country than
      # finja-youtube's VPN_COUNTRY, for IP diversity between the two
      - SERVER_COUNTRIES=${VPN_COUNTRY_IG:-Germany}
      # Free tier or Plus? (set to true for free-only servers)
      - FREE_ONLY=false
      # ---- Gluetun Settings ----
      - TZ=Europe/Berlin
      - UPDATER_PERIOD=24h

    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---- Instagram Reels Browser + API ----
  finja-instagram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finja-instagram
    restart: unless-stopped

    # THE MAGIC: No own network — everything goes through gluetun!
    # = built-in kill switch. VPN down → no internet.
    network_mode: "service:gluetun-instagram"

    depends_on:
      gluetun-instagram:
        condition: service_healthy

    # No ports here! They are defined in the gluetun service above.

    volumes:
      # Persist Chrome profile (Instagram login cookies!)
      - chrome-profile-ig:/data/chrome-profile
      # Instagram cookies (JSON + TXT, injected at startup) -- live in
      # private/, never synced/committed
      - ./private/www.instagram.com_cookies.json:/app/www.instagram.com_cookies.json:ro
      - ./private/www.instagram.com_cookies.txt:/app/www.instagram.com_cookies.txt:ro
      # Screenshots (optional, for debugging)
      - ./screenshots:/app/screenshots

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
      - INSTAGRAM_API_PORT=8061
      - CHROME_PORT=9222
      - INSTAGRAM_TARGET_URL=${INSTAGRAM_TARGET_URL:-about:blank}
      - FINJA_BRAIN_URL=${FINJA_BRAIN_URL:-http://finja-ai:8051}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}

    # Security
    security_opt:
      - no-new-privileges:true

    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chrome-profile-ig:
    name: finja-instagram-chrome-profile
  gluetun-ig-data:
    name: finja-instagram-gluetun

