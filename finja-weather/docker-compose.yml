#
#   Stateless weather microservice.
#   Port 8095 -> container 80.
#
# ======================================================================

services:
  weather:
    build: .
    container_name: finja_weather
    ports:
      - "8095:80"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEATHER_PROVIDER=${WEATHER_PROVIDER:-open-meteo}
