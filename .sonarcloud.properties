# SonarCloud Project Configuration
# https://sonarcloud.io/project/overview?id=JohnV2002_Finja-AI-Ecosystem

# Source encoding
sonar.sourceEncoding=UTF-8

# ============================================================
# Exclusions — Legacy/abandoned code ("Not Maintained")
# ============================================================

# Exclude from all source analysis (bugs, code smells, vulnerabilities)
sonar.exclusions=**/Not Maintained/**,TESTING.md,README.md

# Exclude from security hotspot detection
sonar.security.exclusions=**/Not Maintained/**

# Exclude from duplication detection
sonar.cpd.exclusions=**/Not Maintained/**

# Ignore ALL rules for Not Maintained code via multicriteria
sonar.issue.ignore.multicriteria=notMaintained
sonar.issue.ignore.multicriteria.notMaintained.ruleKey=*
sonar.issue.ignore.multicriteria.notMaintained.resourceKey=**/Not Maintained/**
